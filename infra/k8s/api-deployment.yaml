apiVersion: apps/v1
kind: Deployment
metadata:
  name: xrayai-api
  labels:
    app: xrayai-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: xrayai-api
  template:
    metadata:
      labels:
        app: xrayai-api
    spec:
      containers:
        - name: api
          image: ghcr.io/xrayai/api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: xrayai-api-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: xrayai-api
spec:
  selector:
    app: xrayai-api
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
