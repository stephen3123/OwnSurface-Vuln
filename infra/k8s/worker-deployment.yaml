apiVersion: apps/v1
kind: Deployment
metadata:
  name: xrayai-worker
  labels:
    app: xrayai-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: xrayai-worker
  template:
    metadata:
      labels:
        app: xrayai-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/xrayai/worker:latest
          envFrom:
            - secretRef:
                name: xrayai-worker-secrets
          resources:
            requests:
              cpu: "1000m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
