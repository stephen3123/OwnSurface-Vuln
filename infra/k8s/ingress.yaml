apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xrayai-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "30"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.xrayai.com
      secretName: xrayai-api-tls
  rules:
    - host: api.xrayai.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: xrayai-api
                port:
                  number: 80
